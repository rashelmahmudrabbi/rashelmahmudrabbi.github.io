<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Curriculum Vitae – Rashel Mahmud Rabbi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy:#0b1e3d; --navy-mid:#10284f; --navy-lt:#1a3a6e;
      --gold:#c8952a; --gold-lt:#e8b84b;
      --cream:#f5f0e8; --off-white:#fafaf8;
      --text-dark:#1a1a2e; --text-mid:#4a4a6a;
      --border:#ddd8cd; --section-bg:#ffffff;
    }
    html{scroll-behavior:smooth;}
    body{font-family:'DM Sans',sans-serif;background:var(--off-white);color:var(--text-dark);font-size:15px;}
    h1,h2,h3,h4,h5,h6{font-family:'Crimson Pro',serif;}

    .navbar{background:var(--navy);padding:.75rem 0;position:sticky;top:0;z-index:1000;box-shadow:0 2px 12px rgba(0,0,0,.35);}
    .navbar-brand{color:var(--gold)!important;font-family:'Crimson Pro',serif;font-size:1.2rem;font-weight:700;}
    .navbar .nav-link{color:#ffffff!important;font-size:.8rem;font-weight:500;letter-spacing:.4px;text-transform:uppercase;padding:.4rem .8rem!important;transition:color .2s;}
    .navbar .nav-link:hover,.navbar .nav-link.active{color:var(--gold-lt)!important;}
    .navbar-toggler{border-color:rgba(255,255,255,.3);}

    .page-hero{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 60%,#1a3a6e 100%);color:#fff;padding:3.5rem 0 3rem;position:relative;overflow:hidden;}
    .page-hero::before{content:'';position:absolute;inset:0;pointer-events:none;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");}
    .page-hero h1{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;color:#fff;margin-bottom:.5rem;}
    .breadcrumb-nav a{color:var(--gold-lt);text-decoration:none;font-size:.82rem;}
    .breadcrumb-nav span{color:rgba(255,255,255,.5);font-size:.82rem;margin:0 .4rem;}
    .btn-download-cv{background:var(--gold);border:none;color:var(--navy);font-weight:700;font-size:.9rem;padding:.55rem 1.5rem;border-radius:25px;transition:all .25s;display:inline-flex;align-items:center;gap:.5rem;text-decoration:none;}
    .btn-download-cv:hover{background:var(--gold-lt);color:var(--navy);}
    .btn-view-online{background:transparent;border:2px solid rgba(255,255,255,.4);color:#fff;font-weight:500;font-size:.85rem;padding:.45rem 1.2rem;border-radius:25px;transition:all .25s;display:inline-flex;align-items:center;gap:.5rem;text-decoration:none;}
    .btn-view-online:hover{border-color:#fff;background:rgba(255,255,255,.1);color:#fff;}

    /* CV LAYOUT */
    .cv-wrapper{max-width:900px;margin:3rem auto;padding:0 1rem 3rem;}

    /* SECTION */
    .cv-section{margin-bottom:2.5rem;}
    .cv-section-title{font-size:1rem;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:1.5px;padding-bottom:.5rem;border-bottom:2px solid var(--gold);margin-bottom:1.2rem;display:flex;align-items:center;gap:.5rem;}
    .cv-section-title i{color:var(--gold);font-size:1rem;}

    /* PROFILE CARD */
    .cv-profile-card{background:var(--section-bg);border:1px solid var(--border);border-radius:12px;padding:2rem;margin-bottom:2rem;display:flex;gap:1.8rem;align-items:flex-start;}
    .cv-avatar{width:100px;height:100px;border-radius:50%;border:3px solid var(--gold);object-fit:cover;flex-shrink:0;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:var(--gold);}
    .cv-name{font-size:1.8rem;font-weight:700;color:var(--navy);line-height:1.1;margin-bottom:.3rem;}
    .cv-title-text{color:var(--gold);font-size:.9rem;font-weight:500;letter-spacing:.5px;text-transform:uppercase;margin-bottom:.8rem;}
    .cv-contact-row{display:flex;flex-wrap:wrap;gap:.5rem 1.5rem;}
    .cv-contact-item{font-size:.83rem;color:var(--text-mid);display:flex;align-items:center;gap:.3rem;}
    .cv-contact-item a{color:var(--text-mid);text-decoration:none;}
    .cv-contact-item a:hover{color:var(--gold);}
    .cv-contact-item i{color:var(--gold);font-size:.9rem;}

    /* TIMELINE */
    .cv-timeline{position:relative;padding-left:1.8rem;}
    .cv-timeline::before{content:'';position:absolute;left:.5rem;top:0;bottom:0;width:2px;background:var(--border);}
    .cv-item{position:relative;margin-bottom:1.5rem;}
    .cv-dot{position:absolute;left:-1.68rem;top:.3rem;width:12px;height:12px;border-radius:50%;background:var(--gold);border:2px solid var(--off-white);box-shadow:0 0 0 2px var(--gold);}
    .cv-item-card{background:var(--section-bg);border:1px solid var(--border);border-radius:8px;padding:1.2rem 1.4rem;}
    .cv-item-title{font-weight:700;color:var(--navy);font-size:1rem;margin-bottom:.2rem;}
    .cv-item-org{color:var(--gold);font-size:.87rem;font-weight:500;margin-bottom:.2rem;}
    .cv-item-meta{color:var(--text-mid);font-size:.82rem;margin-bottom:.5rem;display:flex;gap:.8rem;flex-wrap:wrap;}
    .cv-item-meta span{display:flex;align-items:center;gap:.25rem;}
    .cv-item-desc{font-size:.88rem;color:var(--text-mid);line-height:1.65;}
    .cv-item-desc ul{margin:.4rem 0 0;padding-left:1.1rem;}
    .cv-item-desc li{margin-bottom:.25rem;}

    /* EDUCATION TABLE */
    .edu-table{background:var(--section-bg);border-radius:10px;overflow:hidden;box-shadow:0 2px 14px rgba(0,0,0,.06);}
    .edu-table thead{background:var(--navy);color:#fff;}
    .edu-table thead th{font-family:'DM Sans',sans-serif;font-weight:500;font-size:.8rem;letter-spacing:.5px;text-transform:uppercase;padding:.9rem 1rem;border:none;}
    .edu-table tbody td{padding:.85rem 1rem;vertical-align:middle;border-color:var(--border);font-size:.9rem;}
    .edu-table tbody tr:hover{background:rgba(200,149,42,.05);}
    .grade-badge{background:var(--gold);color:var(--navy);font-weight:700;font-size:.78rem;padding:.2rem .6rem;border-radius:20px;}

    /* SKILLS GRID */
    .skills-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;}
    .skill-group{background:var(--section-bg);border:1px solid var(--border);border-radius:8px;padding:1rem 1.2rem;}
    .skill-group-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-mid);margin-bottom:.7rem;}
    .skill-tag{display:inline-block;background:var(--navy);color:#e8e8f5;font-size:.78rem;padding:.28rem .75rem;border-radius:20px;margin:.2rem .2rem .2rem 0;}

    /* TWO-COL LAYOUT */
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}

    /* PUBS MINI */
    .pub-mini{background:var(--section-bg);border:1px solid var(--border);border-radius:8px;padding:1rem 1.2rem;margin-bottom:.7rem;border-left:4px solid var(--gold);}
    .pub-mini-title{font-family:'Crimson Pro',serif;font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:.3rem;line-height:1.35;}
    .pub-mini-meta{font-size:.8rem;color:var(--text-mid);}
    .pub-mini-badge{font-size:.68rem;font-weight:700;text-transform:uppercase;padding:.15rem .5rem;border-radius:10px;margin-right:.3rem;}
    .badge-conference{background:#cce5ff;color:#004085;}
    .badge-journal{background:#d4edda;color:#155724;}
    .status-published{color:#155724;font-size:.75rem;font-weight:600;}
    .status-under_review{color:#856404;font-size:.75rem;font-weight:600;}

    /* REFS */
    .ref-mini{background:var(--section-bg);border:1px solid var(--border);border-top:3px solid var(--gold);border-radius:8px;padding:1.1rem 1.2rem;}
    .ref-mini-name{font-weight:700;color:var(--navy);font-size:.97rem;margin-bottom:.2rem;}
    .ref-mini-role{font-size:.82rem;color:var(--gold);font-weight:500;}
    .ref-mini-org{font-size:.8rem;color:var(--text-mid);margin-bottom:.5rem;}
    .ref-mini a{font-size:.8rem;color:var(--text-mid);text-decoration:none;display:block;}
    .ref-mini a:hover{color:var(--gold);}

    /* PRINT / PDF NOTE */
    .pdf-note{background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:.9rem 1.2rem;text-align:center;margin-bottom:2rem;font-size:.85rem;color:var(--text-mid);}
    .pdf-note i{color:var(--gold);margin-right:.4rem;}

    footer{background:var(--navy);color:rgba(255,255,255,.55);text-align:center;padding:1.8rem 0;font-size:.82rem;}
    footer a{color:var(--gold);text-decoration:none;}
    #scrollTop{position:fixed;bottom:2rem;right:2rem;width:42px;height:42px;background:var(--gold);color:var(--navy);border:none;border-radius:50%;font-size:1.1rem;display:none;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(200,149,42,.4);cursor:pointer;z-index:999;}
    #scrollTop:hover{background:var(--gold-lt);}

    @media(max-width:768px){
      .cv-profile-card{flex-direction:column;gap:1rem;}
      .skills-grid,.two-col{grid-template-columns:1fr;}
    }
    @media print{
      .navbar,.filter-bar,.pdf-note,footer,#scrollTop{display:none!important;}
      .cv-wrapper{margin:0;padding:0;}
      .cv-item-card,.skill-group,.pub-mini,.ref-mini,.edu-table{break-inside:avoid;}
    }
  </style>
</head>
